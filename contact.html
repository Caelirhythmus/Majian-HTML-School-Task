<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>联系方式 - 马健</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; background: #ededed; color: #191919; }
  
  .wechat-app {
    max-width: 420px; margin: 0 auto; height: 100vh; 
    background: #ededed; display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,.15);
  }

  .status-bar {
    background: #ededed; padding: 8px 16px 4px;
    display: flex; justify-content: space-between;
    font-size: 12px; color: #000; font-weight: 600;
  }

  .nav-bar {
    background: #ededed; padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #d9d9d9;
    min-height: 44px;
  }
  .nav-bar .nav-title {
    font-size: 17px; font-weight: 500; flex: 1; text-align: center;
    color: #191919; text-decoration: none;
  }
  .nav-bar .nav-right { width: 60px; text-align: right; font-size: 14px; color: #191919; }

  .tab-bar {
    background: #f7f7f7; border-top: 1px solid #d9d9d9;
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
    flex-shrink: 0;
  }
  .tab-item {
    flex: 1; text-align: center; padding: 6px 0;
    text-decoration: none; display: block;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-item .tab-icon { font-size: 20px; display: block; line-height: 1; color: #999; }
  .tab-item .tab-label { font-size: 10px; color: #999; margin-top: 2px; }
  .tab-item.active .tab-label { color: #191919; font-weight: 500; }
  .tab-item.active .tab-icon { color: #191919; }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 12px 16px 8px;
    background: #ededed;
  }
  .chat-area::-webkit-scrollbar { width: 0; }

  .time-divider {
    text-align: center; margin: 8px 0 12px;
    font-size: 12px; color: #999;
  }
  .time-divider span {
    background: #d5d5d5; color: #fff; padding: 2px 8px;
    border-radius: 4px; font-size: 11px;
  }

  .msg-row { display: flex; margin-bottom: 14px; align-items: flex-start; }
  .msg-row.right { flex-direction: row-reverse; }

  .avatar {
    width: 40px; height: 40px; border-radius: 6px;
    flex-shrink: 0; background: #c0c0c0;
    overflow: hidden; font-size: 0;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar .text-avatar {
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff; line-height: 1;
    height: 100%;
  }

  .msg-content { max-width: 72%; margin: 0 10px; }
  .msg-name { font-size: 12px; color: #999; margin-bottom: 2px; }
  .msg-row.right .msg-name { text-align: right; }

  .bubble {
    padding: 8px 12px; border-radius: 8px;
    font-size: 15px; line-height: 1.6; word-break: break-word;
    position: relative;
  }
  .msg-row:not(.right) .bubble {
    background: #fff; color: #191919;
    border-top-left-radius: 2px;
  }
  .msg-row.right .bubble {
    background: #95ec69; color: #191919;
    border-top-right-radius: 2px;
  }
  .bubble img { max-width: 100%; border-radius: 6px; display: block; margin: 6px 0; }

  .contact-item {
    display: flex; align-items: center; padding: 10px 0;
    border-bottom: 1px solid #e0e0e0;
  }
  .contact-item:last-child { border-bottom: none; }
  .contact-icon {
    width: 36px; height: 36px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #fff;
    margin-right: 12px; flex-shrink: 0;
  }
  .ci-mail { background: #e74c3c; }
  .ci-wechat { background: #07c160; }
  .ci-github { background: #333; }
  .ci-phone { background: #576b95; }
  .contact-info { flex: 1; }
  .contact-info .title { font-size: 15px; font-weight: 500; }
  .contact-info .sub { font-size: 12px; color: #999; margin-top: 2px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row { animation: fadeUp .35s ease both; }
  .msg-row:nth-child(2) { animation-delay: .08s; }
  .msg-row:nth-child(3) { animation-delay: .16s; }
  .msg-row:nth-child(4) { animation-delay: .24s; }
  .msg-row:nth-child(5) { animation-delay: .32s; }
  .msg-row:nth-child(6) { animation-delay: .40s; }
  .msg-row:nth-child(7) { animation-delay: .48s; }
  .msg-row:nth-child(8) { animation-delay: .56s; }

  @media (min-width: 421px) {
    .wechat-app { height: 100vh; border-radius: 0; }
  }
  @media (prefers-color-scheme: dark) {
    .wechat-app, .chat-area, .status-bar, .nav-bar { background: #ededed; }
    .tab-bar { background: #f7f7f7; }
  }
</style>
</head>
<body>

<div class="wechat-app">

    </div>

    <div class="msg-row">
      <div class="avatar"><img src="images/马健头像.jpg" alt="马健"></div>
      <div class="msg-content">
        <div class="msg-name">马健</div>
        <div class="bubble">
          <div class="contact-item">
            <div class="contact-icon ci-mail">邮</div>
            <div class="contact-info">
              <div class="title">邮箱</div>

          </div>
          <div class="contact-item">
            <div class="contact-icon ci-wechat">信</div>
            <div class="contact-info">
              <div class="title">微信</div>
              <div class="sub">MaJian_EDU</div>
            </div>
          </div>
          <div class="contact-item">
            <div class="contact-icon ci-github">G</div>
            <div class="contact-info">
              <div class="title">GitHub</div>

          </div>
          <div class="contact-item">
            <div class="contact-icon ci-phone">电</div>
            <div class="contact-info">
              <div class="title">电话</div>
              <div class="sub">+86 138-0000-1234</div>

          </div>
        </div>
      </div>
    </div>

    <div class="msg-row">
      <div class="avatar"><img src="images/马健头像.jpg" alt="马健"></div>
      <div class="msg-content">
        <div class="msg-name">马健</div>
        <div class="bubble">
          感谢你的访问！期待与你交流<br>
          <span style="font-size:12px;color:#999;">点击下方标签页可以回到「个人简介」或「课程介绍」</span>
        </div>
      </div>
    </div>

    <div class="msg-row right">
      <div class="avatar"><div class="text-avatar" style="background:#576b95;">访</div></div>
      <div class="msg-content">
        <div class="msg-name">访客</div>
        <div class="bubble">好的，保持联系！</div>
      </div>
    </div>

  </div><!-- /.chat-area -->

  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <span class="tab-icon">人</span>
      <span class="tab-label">个人简介</span>
    </a>
    <a href="courses.html" class="tab-item">
      <span class="tab-icon">书</span>
      <span class="tab-label">课程介绍</span>
    </a>
    <a href="contact.html" class="tab-item active">
      <span class="tab-icon">信</span>
      <span class="tab-label">联系方式</span>
    </a>
  </div>

</div><!-- /.wechat-app -->

<script>
  function updateTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('statusTime').textContent = h + ':' + m;
  }
  updateTime();
  setInterval(updateTime, 30000);
</script>

</body>
</html>
